<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Prediction</title>

<style>
body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
padding: 20px;
}

.header {
    position: absolute;
    top: 20px;
    right: 20px;
    display: flex;
    align-items: center;
    gap: 15px;
    color: white;
    font-size: 14px;
}

.logout-btn {
    background: rgba(255, 255, 255, 0.3);
    color: white;
    border: 1px solid white;
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.3s;
}

.logout-btn:hover {
    background: rgba(255, 255, 255, 0.5);
}

.container{
background:white;
padding:40px;
border-radius:8px;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
width:100%;
max-width:500px;
animation: slideIn 0.5s ease-in-out;
}

@keyframes slideIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

h1{
text-align:center;
color:#333;
margin-top: 0;
}

.result{
text-align:center;
font-size:18px;
color:green;
margin-top:10px;
}

form{
display:flex;
flex-direction:column;
}

label{
margin-top:15px;
font-weight:bold;
color: #333;
}

input, select{
padding:10px;
margin-top:5px;
border:1px solid #ddd;
border-radius:4px;
font-size:15px;
transition: border-color 0.3s;
}

input:focus, select:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
}

button{
margin-top:20px;
padding:12px;
background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
color:white;
border:none;
border-radius:4px;
font-size:16px;
cursor:pointer;
transition: all 0.3s ease;
font-weight: bold;
}

button:hover{
transform: translateY(-2px);
box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
}
</style>

</head>

<body>

<div class="header">
    <span>Welcome, <strong>{{ username }}</strong></span>
    <a href="/logout" class="logout-btn">Logout</a>
</div>

<div class="container">

<h1>🌤️ Weather Prediction</h1>

{% if prediction_text %}
<p class="result">{{ prediction_text }}</p>
{% endif %}

<form method="POST" action="/predict">

<label>Temperature (°C)</label>
<input type="number" name="temperature" step="any" value="{{ temperature or '' }}" required>

<label>Humidity (%)</label>
<input type="number" name="humidity" value="{{ humidity or '' }}" required>

<label>Wind Speed (km/h)</label>
<input type="number" name="wind_speed" step="any" value="{{ wind_speed or '' }}" required>

<label>Precipitation (%)</label>
<input type="number" name="precipitation" step="any" required>

<label>Cloud Cover</label>
<select name="cloud_cover" required>
<option value="0">Sunny</option>
<option value="1">Partly Cloudy</option>
<option value="2">Cloudy</option>
<option value="3">Overcast</option>
</select>

<label>UV Index</label>
<input type="number" name="uv_index" required>

<label>Season</label>
<select name="season" required>
<option value="Winter">Winter</option>
<option value="Spring">Spring</option>
<option value="Summer">Summer</option>
<option value="Autumn">Autumn</option>
</select>

<label>Visibility (km)</label>
<input type="number" name="visibility" step="any" required>

<label>Location</label>
<select name="location" required>
<option value="0">Inland</option>
<option value="1">Mountain</option>
<option value="2">Coastal</option>
</select>

<label>Atmospheric Pressure</label>
<input type="number" name="pressure" step="any" required>

<button type="submit">Predict Weather</button>

</form>

</div>

</body>
</html>
